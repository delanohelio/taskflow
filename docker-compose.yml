services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/app/data/tasks.db
      - PAGE_PASSWORD=${PAGE_PASSWORD:-}
      - AUTO_ARCHIVE_AFTER_MINUTES=${AUTO_ARCHIVE_AFTER_MINUTES:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    ports:
      - "4000:80"
    depends_on:
      - backend
    restart: unless-stopped
